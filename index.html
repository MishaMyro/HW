<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A catalog of English homework and test pages published with GitHub Pages."
    />
    <title>English Homework Pages</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="intro">
        <h1>English homework and tests</h1>
        <p class="lead">
          A simple catalog for English homework and test pages. Each page lives
          in its own folder and is listed here with a stable ID, creation date,
          and direct link.
        </p>
      </header>

      <section class="table-section" aria-labelledby="pages-title">
        <div class="section-heading">
          <h2 id="pages-title">Published pages</h2>
          <span class="counter">1 page</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Title</th>
                <th scope="col">Date created</th>
                <th scope="col">Link</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td data-label="ID">1</td>
                <td data-label="Title">Present Perfect knowledge test</td>
                <td data-label="Date created">
                  <time datetime="2026-06-24">2026-06-24</time>
                </td>
                <td data-label="Link">
                  <a href="example/">Open page</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
