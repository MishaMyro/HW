<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Homework pages published with GitHub Pages." />
    <title>Homework Pages</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <p class="eyebrow">GitHub Pages</p>
        <h1>Homework pages</h1>
        <p class="lead">
          Choose the page you want to open. Each homework page lives in its own
          folder, so old work stays available when a new page is added.
        </p>
      </section>

      <section class="links" aria-label="Published pages">
        <a class="link-card" href="english-homework/">
          <span class="label">New</span>
          <strong>English homework</strong>
          <span>Be used to + -ing</span>
        </a>

        <a class="link-card" href="simple-static/">
          <span class="label">Previous</span>
          <strong>Simple static page</strong>
          <span>The earlier GitHub Pages test page</span>
        </a>
      </section>
    </main>
  </body>
</html>
